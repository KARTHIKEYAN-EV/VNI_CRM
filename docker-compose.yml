version: '3.9'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      # Use Session Pooler (IPv4 compatible) with project ID in username
      DATABASE_URL: postgresql://postgres.wyllumjnckgfzdwwqsdi:ev%2AKarthi29%4001%232007@aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 480
      DEBUG: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
